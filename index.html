<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arianna Calderara | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Custom Pastel Stylesheet */
        body {
            background: linear-gradient(135deg, #fdfcfb 0%, #eef2f3 100%);
            background-attachment: fixed;
            color: #4a5568;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.04);
        }

        .nav-blur {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
        }

        .float {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translate(0, 0px); }
            50% { transform: translate(0, 15px); }
            100% { transform: translate(0, -0px); }
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: #b19cd9; /* Pastel Purple */
            margin-top: 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body class="font-sans leading-relaxed">

    <nav class="fixed top-0 w-full nav-blur z-50 border-b border-white/40">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="font-bold text-gray-800 tracking-tighter text-xl">Arianna Calderara</span>
            <div class="hidden md:flex space-x-8 text-xs uppercase tracking-widest font-bold text-gray-500">
                <a href="#about" class="hover:text-[#b19cd9] transition">About</a>
                <a href="#projects" class="hover:text-[#77dd77] transition">Projects</a>
                <a href="#passions" class="hover:text-[#ffb347] transition">Beyond the code</a>
            </div>
        </div>
    </nav>
